<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <style>
    text { font-family: monospace; font-size: 12px; fill: #ccc; }
    .label { font-size: 14px; fill: #fff; text-anchor: middle; }
    .dim { font-size: 10px; fill: #888; text-anchor: middle; }
    .turret-label { font-size: 9px; fill: #5b9bd5; text-anchor: middle; }
    .crew { font-size: 10px; fill: #6ecf72; text-anchor: middle; }
    .block { fill: none; stroke: #5b9bd5; stroke-width: 2; opacity: 0.6; }
  </style>
  <rect width="600" height="380" fill="#1a2744"/>
  <text x="300" y="30" class="label" font-size="16">Castle Layout — Birds-Eye View</text>

  <!-- grid -->
  <g stroke="#253a5e" stroke-width="0.5">
    <line x1="0" y1="70" x2="600" y2="70"/><line x1="0" y1="110" x2="600" y2="110"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="190" x2="600" y2="190"/>
    <line x1="0" y1="230" x2="600" y2="230"/><line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="310" x2="600" y2="310"/>
    <line x1="40" y1="40" x2="40" y2="350"/><line x1="80" y1="40" x2="80" y2="350"/>
    <line x1="120" y1="40" x2="120" y2="350"/><line x1="160" y1="40" x2="160" y2="350"/>
    <line x1="200" y1="40" x2="200" y2="350"/><line x1="240" y1="40" x2="240" y2="350"/>
    <line x1="280" y1="40" x2="280" y2="350"/><line x1="320" y1="40" x2="320" y2="350"/>
    <line x1="360" y1="40" x2="360" y2="350"/><line x1="400" y1="40" x2="400" y2="350"/>
    <line x1="440" y1="40" x2="440" y2="350"/><line x1="480" y1="40" x2="480" y2="350"/>
    <line x1="520" y1="40" x2="520" y2="350"/><line x1="560" y1="40" x2="560" y2="350"/>
  </g>

  <!-- wall lines -->
  <g stroke="#5b9bd5" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3">
    <line x1="80" y1="70" x2="520" y2="70"/>
    <line x1="80" y1="70" x2="80" y2="290"/>
    <line x1="520" y1="70" x2="520" y2="290"/>
    <line x1="80" y1="290" x2="240" y2="290"/>
    <line x1="360" y1="290" x2="520" y2="290"/>
  </g>

  <!-- bucket-blocks: corner turrets (4) -->
  <g class="block">
    <circle cx="80" cy="70" r="20"/>
    <circle cx="520" cy="70" r="20"/>
    <circle cx="80" cy="290" r="20"/>
    <circle cx="520" cy="290" r="20"/>
  </g>
  <g fill="#5b9bd5" opacity="0.1">
    <circle cx="80" cy="70" r="20"/>
    <circle cx="520" cy="70" r="20"/>
    <circle cx="80" cy="290" r="20"/>
    <circle cx="520" cy="290" r="20"/>
  </g>

  <!-- bucket-blocks: top wall (10) -->
  <g class="block">
    <circle cx="120" cy="70" r="20"/><circle cx="160" cy="70" r="20"/>
    <circle cx="200" cy="70" r="20"/><circle cx="240" cy="70" r="20"/>
    <circle cx="280" cy="70" r="20"/><circle cx="320" cy="70" r="20"/>
    <circle cx="360" cy="70" r="20"/><circle cx="400" cy="70" r="20"/>
    <circle cx="440" cy="70" r="20"/><circle cx="480" cy="70" r="20"/>
  </g>

  <!-- bucket-blocks: left wall (4) -->
  <g class="block">
    <circle cx="80" cy="114" r="20"/><circle cx="80" cy="158" r="20"/>
    <circle cx="80" cy="202" r="20"/><circle cx="80" cy="246" r="20"/>
  </g>

  <!-- bucket-blocks: right wall (4) -->
  <g class="block">
    <circle cx="520" cy="114" r="20"/><circle cx="520" cy="158" r="20"/>
    <circle cx="520" cy="202" r="20"/><circle cx="520" cy="246" r="20"/>
  </g>

  <!-- bucket-blocks: bottom wall left of entrance (3) -->
  <g class="block">
    <circle cx="120" cy="290" r="20"/><circle cx="160" cy="290" r="20"/>
    <circle cx="200" cy="290" r="20"/>
  </g>

  <!-- bucket-blocks: bottom wall right of entrance (3) -->
  <g class="block">
    <circle cx="400" cy="290" r="20"/><circle cx="440" cy="290" r="20"/>
    <circle cx="480" cy="290" r="20"/>
  </g>

  <!-- entrance -->
  <path d="M 230 290 A 70 40 0 0 1 370 290" fill="none" stroke="#e8c44a" stroke-width="2" stroke-dasharray="6"/>
  <text x="300" y="330" class="dim" fill="#e8c44a">ENTRANCE</text>

  <!-- turret labels -->
  <text x="80" y="48" class="turret-label">NW</text>
  <text x="520" y="48" class="turret-label">NE</text>
  <text x="80" y="316" class="turret-label">SW</text>
  <text x="520" y="316" class="turret-label">SE</text>

  <!-- crew zones -->
  <rect x="100" y="90" width="200" height="180" fill="#6ecf72" opacity="0.04" stroke="#6ecf72" stroke-width="1" stroke-dasharray="4"/>
  <text x="200" y="185" class="crew">CREW 1</text>
  <rect x="300" y="90" width="200" height="180" fill="#d4a0e8" opacity="0.04" stroke="#d4a0e8" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="185" class="crew" fill="#d4a0e8">CREW 2</text>

  <!-- dimension annotations -->
  <line x1="80" y1="42" x2="520" y2="42" stroke="#888" stroke-width="1" stroke-dasharray="4"/>
  <text x="300" y="39" class="dim">WIDTH</text>
  <line x1="555" y1="70" x2="555" y2="290" stroke="#888" stroke-width="1" stroke-dasharray="4"/>
  <text x="570" y="185" class="dim" transform="rotate(90,570,185)">DEPTH</text>

  <!-- compass rose -->
  <g transform="translate(30,340)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#888" stroke-width="1"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#888" stroke-width="1"/>
    <polygon points="0,-12 -3,-4 3,-4" fill="#e8c44a"/>
    <text x="0" y="-16" class="dim" fill="#e8c44a">N</text>
  </g>

  <!-- courtyard -->
  <text x="300" y="195" class="label">COURTYARD</text>

  <!-- block count -->
  <text x="300" y="365" class="dim" fill="#fff">TOTAL: 28 bucket-blocks per story</text>
</svg>
