<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <style>
    text { font-family: monospace; font-size: 12px; fill: #ccc; }
    .label { font-size: 14px; fill: #fff; text-anchor: middle; }
    .dim { font-size: 10px; fill: #888; text-anchor: middle; }
  </style>

  <!-- background -->
  <rect width="600" height="350" fill="#1a2744"/>

  <!-- title -->
  <text x="300" y="30" class="label" font-size="16">Castle Layout — Birds-Eye View</text>

  <!-- walls -->
  <g stroke="#5b9bd5" stroke-width="8" fill="none" stroke-linecap="round">
    <line x1="80" y1="70" x2="520" y2="70"/>
    <line x1="80" y1="70" x2="80" y2="290"/>
    <line x1="520" y1="70" x2="520" y2="290"/>
    <line x1="80" y1="290" x2="260" y2="290"/>
    <line x1="340" y1="290" x2="520" y2="290"/>
  </g>

  <!-- entrance marker -->
  <line x1="260" y1="290" x2="260" y2="310" stroke="#e8c44a" stroke-width="2"/>
  <line x1="340" y1="290" x2="340" y2="310" stroke="#e8c44a" stroke-width="2"/>
  <text x="300" y="330" class="dim" fill="#e8c44a">ENTRANCE</text>

  <!-- corner turrets -->
  <g fill="none" stroke="#5b9bd5" stroke-width="3">
    <circle cx="80" cy="70" r="20"/>
    <circle cx="520" cy="70" r="20"/>
    <circle cx="80" cy="290" r="20"/>
    <circle cx="520" cy="290" r="20"/>
  </g>
  <g fill="#5b9bd5" opacity="0.15">
    <circle cx="80" cy="70" r="20"/>
    <circle cx="520" cy="70" r="20"/>
    <circle cx="80" cy="290" r="20"/>
    <circle cx="520" cy="290" r="20"/>
  </g>

  <!-- courtyard label -->
  <text x="300" y="185" class="label">COURTYARD</text>
</svg>
