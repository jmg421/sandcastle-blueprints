<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <style>
    text { font-family: monospace; font-size: 12px; fill: #ccc; }
    .label { font-size: 14px; fill: #fff; text-anchor: middle; }
    .dim { font-size: 10px; fill: #888; text-anchor: middle; }
    .turret-label { font-size: 9px; fill: #5b9bd5; text-anchor: middle; }
    .build { font-size: 9px; fill: #fff; text-anchor: middle; font-weight: bold; }
    .crew { font-size: 10px; fill: #6ecf72; text-anchor: middle; }
  </style>
  <rect width="600" height="420" fill="#1a2744"/>
  <text x="300" y="30" class="label" font-size="16">Castle Layout — Birds-Eye View</text>

  <!-- grid -->
  <g stroke="#253a5e" stroke-width="0.5">
    <line x1="0" y1="70" x2="600" y2="70"/><line x1="0" y1="110" x2="600" y2="110"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="190" x2="600" y2="190"/>
    <line x1="0" y1="230" x2="600" y2="230"/><line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="310" x2="600" y2="310"/>
    <line x1="40" y1="40" x2="40" y2="350"/><line x1="80" y1="40" x2="80" y2="350"/>
    <line x1="120" y1="40" x2="120" y2="350"/><line x1="160" y1="40" x2="160" y2="350"/>
    <line x1="200" y1="40" x2="200" y2="350"/><line x1="240" y1="40" x2="240" y2="350"/>
    <line x1="280" y1="40" x2="280" y2="350"/><line x1="320" y1="40" x2="320" y2="350"/>
    <line x1="360" y1="40" x2="360" y2="350"/><line x1="400" y1="40" x2="400" y2="350"/>
    <line x1="440" y1="40" x2="440" y2="350"/><line x1="480" y1="40" x2="480" y2="350"/>
    <line x1="520" y1="40" x2="520" y2="350"/><line x1="560" y1="40" x2="560" y2="350"/>
  </g>

  <!-- wall thickness -->
  <g stroke="#5b9bd5" fill="none" stroke-linecap="round">
    <rect x="72" y="62" width="456" height="236" stroke-width="2"/>
    <rect x="92" y="82" width="416" height="196" stroke-width="2"/>
    <rect x="72" y="62" width="456" height="236" fill="#5b9bd5" opacity="0.1" stroke="none"/>
  </g>
  <rect x="92" y="82" width="416" height="196" fill="#1a2744"/>
  <rect x="260" y="270" width="80" height="30" fill="#1a2744"/>

  <!-- drawbridge arc -->
  <path d="M 260 290 A 40 40 0 0 1 340 290" fill="none" stroke="#e8c44a" stroke-width="2" stroke-dasharray="6"/>
  <line x1="260" y1="290" x2="260" y2="310" stroke="#e8c44a" stroke-width="2"/>
  <line x1="340" y1="290" x2="340" y2="310" stroke="#e8c44a" stroke-width="2"/>
  <text x="300" y="330" class="dim" fill="#e8c44a">ENTRANCE / DRAWBRIDGE</text>

  <!-- corner turrets -->
  <g fill="#5b9bd5" opacity="0.15" stroke="#5b9bd5" stroke-width="3">
    <circle cx="80" cy="70" r="20"/>
    <circle cx="520" cy="70" r="20"/>
    <circle cx="80" cy="290" r="20"/>
    <circle cx="520" cy="290" r="20"/>
  </g>

  <!-- turret labels -->
  <text x="55" y="56" class="turret-label">NW</text>
  <text x="545" y="56" class="turret-label">NE</text>
  <text x="55" y="306" class="turret-label">SW</text>
  <text x="545" y="306" class="turret-label">SE</text>

  <!-- build order -->
  <circle cx="80" cy="70" r="8" fill="#e07850" opacity="0.9"/>
  <text x="80" y="74" class="build">1</text>
  <circle cx="520" cy="70" r="8" fill="#e07850" opacity="0.9"/>
  <text x="520" y="74" class="build">2</text>
  <circle cx="520" cy="290" r="8" fill="#e07850" opacity="0.9"/>
  <text x="520" y="294" class="build">3</text>
  <circle cx="80" cy="290" r="8" fill="#e07850" opacity="0.9"/>
  <text x="80" y="294" class="build">4</text>
  <circle cx="300" cy="70" r="8" fill="#e07850" opacity="0.9"/>
  <text x="300" y="74" class="build">5</text>
  <circle cx="300" cy="290" r="8" fill="#e07850" opacity="0.9"/>
  <text x="300" y="294" class="build">6</text>

  <!-- #8: crew zones -->
  <rect x="93" y="83" width="200" height="194" fill="#6ecf72" opacity="0.05" stroke="#6ecf72" stroke-width="1" stroke-dasharray="4"/>
  <text x="193" y="175" class="crew">CREW 1</text>
  <rect x="307" y="83" width="200" height="194" fill="#d4a0e8" opacity="0.05" stroke="#d4a0e8" stroke-width="1" stroke-dasharray="4"/>
  <text x="407" y="175" class="crew" fill="#d4a0e8">CREW 2</text>

  <!-- dimension annotations -->
  <line x1="80" y1="50" x2="520" y2="50" stroke="#888" stroke-width="1" stroke-dasharray="4"/>
  <text x="300" y="46" class="dim">WIDTH</text>
  <line x1="550" y1="70" x2="550" y2="290" stroke="#888" stroke-width="1" stroke-dasharray="4"/>
  <text x="565" y="185" class="dim" transform="rotate(90,565,185)">DEPTH</text>

  <!-- compass rose -->
  <g transform="translate(40,340)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#888" stroke-width="1"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#888" stroke-width="1"/>
    <polygon points="0,-12 -3,-4 3,-4" fill="#e8c44a"/>
    <text x="0" y="-16" class="dim" fill="#e8c44a">N</text>
  </g>

  <!-- courtyard -->
  <text x="300" y="195" class="label">COURTYARD</text>

  <!-- #9: legend -->
  <g transform="translate(80,360)">
    <text x="0" y="0" class="dim" text-anchor="start" fill="#fff" font-size="11">LEGEND:</text>
    <circle cx="80" cy="-4" r="5" fill="#e07850" opacity="0.9"/>
    <text x="90" y="0" class="dim" text-anchor="start">Build Order</text>
    <rect x="155" y="-8" width="10" height="10" fill="#5b9bd5" opacity="0.3" stroke="#5b9bd5" stroke-width="1"/>
    <text x="170" y="0" class="dim" text-anchor="start">Walls</text>
    <circle cx="215" cy="-3" r="5" fill="none" stroke="#5b9bd5" stroke-width="1.5"/>
    <text x="225" y="0" class="dim" text-anchor="start">Turrets</text>
    <rect x="275" y="-8" width="10" height="10" fill="#6ecf72" opacity="0.15" stroke="#6ecf72" stroke-width="1"/>
    <text x="290" y="0" class="dim" text-anchor="start">Crew Zones</text>
    <line x1="345" y1="-3" x2="365" y2="-3" stroke="#e8c44a" stroke-width="2" stroke-dasharray="4"/>
    <text x="370" y="0" class="dim" text-anchor="start">Entrance</text>
  </g>

  <!-- #10: scale bar -->
  <g transform="translate(80,395)">
    <line x1="0" y1="0" x2="110" y2="0" stroke="#888" stroke-width="2"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#888" stroke-width="1"/>
    <line x1="110" y1="-4" x2="110" y2="4" stroke="#888" stroke-width="1"/>
    <text x="55" y="14" class="dim">1 grid square = 1 cylinder width</text>
  </g>
</svg>
